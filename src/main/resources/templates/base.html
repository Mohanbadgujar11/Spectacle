<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spectacle - Premium Eyewear</title>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <th:block layout:fragment="styles"></th:block>
</head>

<body>


  <div th:insert="fragments/navbar :: navbar"></div>

  <div layout:fragment="content"></div>

  <div th:insert="fragments/footer :: footer"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script th:src="@{/javascript/script.js}"></script>

  <!-- sync localStorage cart into server-side cart when user logs in -->
  <script sec:authorize="isAuthenticated()" th:inline="javascript">
    document.addEventListener('DOMContentLoaded', async () => {
      const cartIds = JSON.parse(localStorage.getItem('spectacle-cart')) || [];
      // CSRF token from server
      const csrfHeader = 'X-CSRF-TOKEN';
      const csrfToken = /*[[${_csrf.token}]]*/ '';
      if (cartIds.length > 0) {
        for (const id of cartIds) {
          try {
            await fetch(`/cart/add/${id}`, {
              method: 'POST',
              headers: {
                [csrfHeader]: csrfToken
              }
            });
          } catch (e) {
            console.warn('failed to sync cart item', id, e);
          }
        }
        localStorage.removeItem('spectacle-cart');
        // optionally reload to update cart count badge
        location.reload();
      }
    });
  </script>

</body>

</html>
