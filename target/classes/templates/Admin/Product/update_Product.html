<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-4">
        <div class="head">
            <h1>Update Product</h1>
        </div>

        <form th:action="@{/admin/products/update}" method="post" enctype="multipart/form-data" th:object="${product}">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" th:field="*{name}">
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" th:field="*{category}">
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                </select>
            </div>
            
            <div class="mb-3">
            <label class="form-label">Short Description</label>
            <input type="text" class="form-control" th:field="*{small_description}">
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
        </div>
            <div class="mb-3">
                <label class="form-label">Selling Price</label>
                <input type="number" class="form-control" th:field="*{sellingPrice}">
            </div>

            <div class="mb-3">
                <label class="form-label">Discounted Price</label>
                <input type="number" class="form-control" th:field="*{discountedPrice}">
            </div>

            <div class="mb-3">
                <label class="form-label">Current Image</label>
                <div th:if="${product.productImage != null}">
                    <img th:src="@{'/admin/products/image/' + ${product.id}}" alt="product Image" width="150">
                </div>
                <div th:if="${product.productImage == null}">No Image</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Change Image</label>
                <input type="file" class="form-control" name="imageFile">
            </div>

            <button type="submit" class="btn btn-primary">Update product</button>
            <a th:href="@{/admin/products}" class="btn btn-secondary ms-3">Cancel</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
