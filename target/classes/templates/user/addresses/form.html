<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{base}">
<head>
  <title th:text="${address.id == null ? 'Add' : 'Edit'} + ' Address'"></title>
</head>
<body>
  <div layout:fragment="content">
    <h2 th:text="${address.id == null ? 'Add' : 'Edit'} + ' Address'"></h2>
    <form th:action="${address.id == null} ? @{/user/addresses/add} : @{/user/addresses/update}" method="post">
      <input type="hidden" th:if="${address.id != null}" th:name="id" th:value="${address.id}" />
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" th:value="${address.name}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Area / Street</label>
        <input type="text" name="area" class="form-control" th:value="${address.area}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">City</label>
        <input type="text" name="city" class="form-control" th:value="${address.city}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">State</label>
        <input type="text" name="state" class="form-control" th:value="${address.state}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Pincode</label>
        <input type="number" name="pincode" class="form-control" th:value="${address.pincode}" required />
      </div>
      <button class="btn btn-primary" type="submit">Save</button>
      <a th:href="@{/user/addresses}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</body>
</html>
